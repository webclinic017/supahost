version: "3.8"

name: tenant-{{TENANT_ID}}

networks:
  {{DOCKER_NETWORK}}:
    external: true

volumes:
  db-data:
  storage-data:

services:
  db:
    image: supabase/postgres:latest
    restart: unless-stopped
    networks: [{{DOCKER_NETWORK}}]
    environment:
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"
    volumes:
      - db-data:/var/lib/postgresql/data

  rest:
    image: postgrest/postgrest:latest
    restart: unless-stopped
    networks: [{{DOCKER_NETWORK}}]
    depends_on: [db]
    environment:
      PGRST_DB_URI: "postgres://authenticator:{{POSTGRES_PASSWORD}}@db:5432/postgres"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: "{{JWT_SECRET}}"
      PGRST_DB_SCHEMA: "public,storage"

  auth:
    image: supabase/gotrue:latest
    restart: unless-stopped
    networks: [{{DOCKER_NETWORK}}]
    depends_on: [db]
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_SITE_URL: "http://{{TENANT_ID}}.{{PUBLIC_BASE_DOMAIN}}"
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_JWT_SECRET: "{{JWT_SECRET}}"
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_DB_DRIVER: "postgres"
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:{{POSTGRES_PASSWORD}}@db:5432/postgres"

  realtime:
    image: supabase/realtime:latest
    restart: unless-stopped
    networks: [{{DOCKER_NETWORK}}]
    depends_on: [db]
    environment:
      PORT: "4000"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "supabase_realtime_admin"
      DB_PASSWORD: "{{POSTGRES_PASSWORD}}"
      DB_NAME: "postgres"
      JWT_SECRET: "{{JWT_SECRET}}"

  storage:
    image: supabase/storage-api:latest
    restart: unless-stopped
    networks: [{{DOCKER_NETWORK}}]
    depends_on: [db, rest]
    environment:
      ANON_KEY: "{{ANON_KEY}}"
      SERVICE_KEY: "{{SERVICE_KEY}}"
      POSTGREST_URL: "http://rest:3000"
      PGRST_JWT_SECRET: "{{JWT_SECRET}}"
      DATABASE_URL: "postgres://supabase_storage_admin:{{POSTGRES_PASSWORD}}@db:5432/postgres"
      FILE_SIZE_LIMIT: "52428800"
      STORAGE_BACKEND: "file"
      FILE_STORAGE_BACKEND_PATH: "/var/lib/storage"
    volumes:
      - storage-data:/var/lib/storage

  kong:
    image: kong:3.6
    restart: unless-stopped
    networks: [{{DOCKER_NETWORK}}]
    depends_on: [rest, auth, realtime, storage]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tenant-{{TENANT_ID}}.rule=Host(`{{TENANT_ID}}.{{PUBLIC_BASE_DOMAIN}}`)"
      - "traefik.http.services.tenant-{{TENANT_ID}}.loadbalancer.server.port=8000"
