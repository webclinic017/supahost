networks:
  supahost:
    external: true

services:
  traefik:
    image: traefik:v3.1
    command:
      - "--configFile=/etc/traefik/traefik.yaml"
    ports:
      - "80:80"
      - "8088:8080" # Traefik dashboard
    volumes:
      - "./traefik.yaml:/etc/traefik/traefik.yaml:ro"
      - "./dynamic:/etc/traefik/dynamic"
    networks: [supahost]
