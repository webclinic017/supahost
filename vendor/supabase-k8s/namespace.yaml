apiVersion: v1
kind: Namespace
metadata:
  name: tenant-acme-7f3a
  labels:
    app.kubernetes.io/part-of: supahost
    supahost.io/tenant-id: acme-7f3a
    supahost.io/plan: pro
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-quota
  namespace: tenant-acme-7f3a
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    persistentvolumeclaims: "20"
    services: "20"
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-limits
  namespace: tenant-acme-7f3a
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 1000m
        memory: 1Gi
