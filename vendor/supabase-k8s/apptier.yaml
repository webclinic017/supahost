apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apps-to-postgres
  namespace: tenant-acme-7f3a
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["auth", "rest", "realtime", "storage", "meta", "studio"]
      ports:
        - protocol: TCP
          port: 5432
