apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: tenant-acme-7f3a
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    frameDeny: false
    stsSeconds: 31536000
    stsIncludeSubdomains: true
    stsPreload: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: gzip
  namespace: tenant-acme-7f3a
spec:
  compress: {}
